---

services:
  app:
    # DriveLedger has no published container image (yet) — build it locally.
    build: .
    image: driveledger:latest
    restart: unless-stopped
    # volumes used to keep data persistent
    volumes:
      - data:/App/data
      - keys:/root/.aspnet/DataProtection-Keys
    # expose port and/or use serving via traefik
    ports:
      - 8080:8080

volumes:
  data:
  keys:
