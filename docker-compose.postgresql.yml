---

services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: "driveledger"
      POSTGRES_PASSWORD: "drivepass"
      POSTGRES_DB: "driveledger"
    volumes:
      - postgres:/var/lib/postgresql/
      - /etc/localtime:/etc/localtime:ro

  app:
    # DriveLedger has no published container image (yet) — build it locally.
    build: .
    image: driveledger:latest
    restart: unless-stopped
    environment:
      POSTGRES_CONNECTION: "Host=postgres:5432;Username=driveledger;Password=drivepass;Database=driveledger;"
    # volumes used to keep data persistent
    volumes:
      - data:/App/data
      - keys:/root/.aspnet/DataProtection-Keys
    # expose port and/or use serving via traefik
    ports:
      - 8080:8080

volumes:
  data:
  keys:
  postgres:
